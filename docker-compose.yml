services:
  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://127.0.0.1:8000"
    depends_on:
      - backend

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    command: sh -c "pip install uv && uv sync && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "securehub-backend"
      APP_ENV: "development"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      API_V1_PREFIX: "/api/v1"
      FRONTEND_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
      DEBUG: "true"
